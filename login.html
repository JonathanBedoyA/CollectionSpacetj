<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login | CollectionSpace TJ</title>
	<meta name="description" content="Inicio de sesión para CollectionSpace TJ.">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<header class="site-header">
		<div class="brand-wrap">
			<div class="brand-text">
				<h1>CollectionSpace TJ</h1>
			</div>
		</div>
	</header>

	<main class="login-layout">
		<section class="section-box">
			<div class="form-title">
				<h1>Iniciar sesión</h1>
				<p>Acceso privado para administrar artículos.</p>
			</div>
			<form class="form-card" id="login-form">
				<label>
					Contraseña
					<input type="password" name="password" placeholder="Tu clave" required>
				</label>
				<button class="button primary" type="submit">Entrar</button>
				<a class="button secondary" href="index.html">Volver</a>
			</form>
		</section>
	</main>

	<script src="script.js"></script>
</body>
</html>
